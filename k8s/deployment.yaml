apiVersion: apps/v1
kind: Deployment
metadata:
  name: hwd-app
  labels:
    app: hwd-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hwd-app
  template:
    metadata:
      labels:
        app: hwd-app
    spec:
      securityContext:
        fsGroup: 65534
      initContainers:
      - name: init-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 65534:65534 /app/data && chmod -R ug+rwX /app/data"]
        volumeMounts:
        - name: app-data
          mountPath: /app/data
      containers:
      - name: hwd-app
        image: gateway:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 65534
          runAsGroup: 65534
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        volumeMounts:
        - name: app-data
          mountPath: /app/data
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: hwd-data-pvc
